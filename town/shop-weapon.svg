    <linearGradient id="wr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#546e7a"/><stop offset="1" stop-color="#37474f"/></linearGradient>
  </defs>
  <ellipse cx="114" cy="180" rx="100" ry="10" fill="#000" opacity="0.12"/>

  <!-- corps en pierre -->
