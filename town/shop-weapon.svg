  </g>

  <!-- toit d'ardoise + créneaux -->
  <path d="M20 78 L114 22 L208 78 Z" fill="url(#wr)" stroke="#263238" stroke-width="2"/>
  <g fill="#455a64"><rect x="86" y="30" width="10" height="12"/><rect x="132" y="30" width="10" height="12"/></g>
  <path d="M20 78 L208 78 L208 88 L20 88 Z" fill="#455a64"/>

