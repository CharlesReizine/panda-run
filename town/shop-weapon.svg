  </g>

  <!-- râtelier d'armes à droite -->
  <g transform="translate(176,150)">
    <rect x="-2" y="-30" width="3" height="30" fill="#8d6e63" transform="rotate(-12)"/>
    <polygon points="-6,-32 0,-46 4,-30" fill="#cfd8dc" transform="rotate(-12)"/>
