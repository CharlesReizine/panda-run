<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe6ff"/>
      <stop offset="1" stop-color="#e7f7ff"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ccc65"/>
      <stop offset="1" stop-color="#7cb342"/>
    </linearGradient>
    <radialGradient id="plaza" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0" stop-color="#f0e3c6"/>
      <stop offset="1" stop-color="#d9c49a"/>
    </radialGradient>
  </defs>

  <!-- ciel -->
  <rect width="960" height="540" fill="url(#sky)"/>

  <!-- nuages kawaii -->
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="150" cy="46" rx="46" ry="22"/>
    <ellipse cx="120" cy="54" rx="30" ry="16"/>
    <ellipse cx="185" cy="55" rx="30" ry="15"/>
    <ellipse cx="720" cy="38" rx="52" ry="24"/>
    <ellipse cx="686" cy="47" rx="32" ry="16"/>
    <ellipse cx="758" cy="47" rx="32" ry="16"/>
  </g>

  <!-- collines lointaines -->
  <path d="M0 150 Q160 96 340 140 Q520 184 720 130 Q860 96 960 138 L960 250 L0 250 Z" fill="#8bc34a" opacity="0.55"/>
  <path d="M0 176 Q200 132 420 170 Q640 208 960 158 L960 260 L0 260 Z" fill="#7cb342" opacity="0.7"/>

  <!-- prairie -->
  <rect y="150" width="960" height="390" fill="url(#grass)"/>

  <!-- grande place pavée centrale -->
  <ellipse cx="480" cy="300" rx="405" ry="205" fill="url(#plaza)"/>
  <ellipse cx="480" cy="300" rx="405" ry="205" fill="none" stroke="#c9b184" stroke-width="6"/>

  <!-- fontaine ronde suggérée au centre (repère décoratif) -->
  <ellipse cx="480" cy="300" rx="46" ry="24" fill="#bcdff0" opacity="0.55"/>
  <ellipse cx="480" cy="300" rx="46" ry="24" fill="none" stroke="#c9b184" stroke-width="4"/>

  <!-- buissons fleuris sur le pourtour -->
  <g>
    <g transform="translate(96,392)">
      <circle cx="0" cy="0" r="20" fill="#66a02f"/><circle cx="18" cy="4" r="16" fill="#77b23a"/><circle cx="-16" cy="6" r="14" fill="#77b23a"/>
      <circle cx="-4" cy="-6" r="3" fill="#ffd54f"/><circle cx="10" cy="2" r="3" fill="#ff8a80"/><circle cx="-12" cy="4" r="3" fill="#fff"/>
    </g>
    <g transform="translate(864,384)">
      <circle cx="0" cy="0" r="22" fill="#66a02f"/><circle cx="-20" cy="4" r="16" fill="#77b23a"/><circle cx="18" cy="6" r="14" fill="#77b23a"/>
      <circle cx="4" cy="-6" r="3" fill="#ff8a80"/><circle cx="-10" cy="2" r="3" fill="#fff"/><circle cx="14" cy="6" r="3" fill="#ffd54f"/>
    </g>
    <g transform="translate(140,150)">
      <circle cx="0" cy="0" r="18" fill="#5f9a2c"/><circle cx="16" cy="4" r="13" fill="#72ab37"/>
      <circle cx="0" cy="-4" r="3" fill="#fff"/><circle cx="10" cy="2" r="3" fill="#ffd54f"/>
    </g>
    <g transform="translate(830,150)">
      <circle cx="0" cy="0" r="18" fill="#5f9a2c"/><circle cx="-16" cy="4" r="13" fill="#72ab37"/>
      <circle cx="0" cy="-4" r="3" fill="#ff8a80"/><circle cx="-10" cy="2" r="3" fill="#fff"/>
    </g>
  </g>

  <!-- petites fleurs éparses sur l'herbe -->
  <g>
    <g transform="translate(60,470)"><circle r="4" fill="#fff"/><circle r="1.6" fill="#ffd54f"/></g>
    <g transform="translate(915,500)"><circle r="4" fill="#ff8a80"/><circle r="1.6" fill="#fff"/></g>
    <g transform="translate(40,300)"><circle r="4" fill="#ffd54f"/><circle r="1.6" fill="#fff"/></g>
    <g transform="translate(920,300)"><circle r="4" fill="#fff"/><circle r="1.6" fill="#ffd54f"/></g>
  </g>
</svg>
