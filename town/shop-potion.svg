<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 208 180">
  <defs>
    <linearGradient id="pw" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe08a"/><stop offset="1" stop-color="#ffca28"/></linearGradient>
    <linearGradient id="pr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e53935"/><stop offset="1" stop-color="#b71c1c"/></linearGradient>
  </defs>
  <ellipse cx="104" cy="170" rx="92" ry="10" fill="#000" opacity="0.12"/>

  <!-- corps -->
  <rect x="30" y="70" width="148" height="96" rx="6" fill="url(#pw)" stroke="#c99a12" stroke-width="2"/>
  <!-- colombages -->
  <g stroke="#8d6e63" stroke-width="4" opacity="0.55">
    <line x1="30" y1="120" x2="178" y2="120"/><line x1="72" y1="70" x2="72" y2="120"/><line x1="136" y1="70" x2="136" y2="120"/>
  </g>

  <!-- toit -->
  <path d="M16 74 L104 20 L192 74 Z" fill="url(#pr)" stroke="#7f1414" stroke-width="2"/>
  <path d="M16 74 L192 74 L192 84 L16 84 Z" fill="#8d2020"/>
  <circle cx="104" cy="30" r="5" fill="#ffd54f"/>

  <!-- enseigne suspendue : mortier + pilon -->
  <rect x="70" y="86" width="68" height="30" rx="6" fill="#5d4037" stroke="#3e2723" stroke-width="2"/>
  <g transform="translate(104,101)">
    <path d="M-13 -3 L13 -3 L9 9 L-9 9 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1.5"/>
    <rect x="-15" y="-6" width="30" height="4" rx="2" fill="#bdbdbd"/>
    <rect x="4" y="-16" width="4" height="14" rx="2" fill="#cfd8dc" transform="rotate(20 6 -9)"/>
  </g>

  <!-- petite fiole verte à droite -->
  <g transform="translate(160,58)">
    <rect x="-4" y="-4" width="8" height="5" fill="#8d6e63"/>
    <path d="M-6 1 L6 1 L8 16 Q0 22 -8 16 Z" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
    <circle cx="-2" cy="10" r="2" fill="#c8e6c9" opacity="0.8"/>
  </g>

  <!-- porte -->
  <path d="M90 166 L90 132 Q104 122 118 132 L118 166 Z" fill="#6d4c41" stroke="#4e342e" stroke-width="2"/>
  <circle cx="112" cy="150" r="2.5" fill="#ffd54f"/>

  <!-- fenêtres -->
  <g>
    <rect x="46" y="128" width="26" height="26" rx="3" fill="#b3e5fc" stroke="#4e342e" stroke-width="2"/>
    <line x1="59" y1="128" x2="59" y2="154" stroke="#4e342e" stroke-width="1.5"/><line x1="46" y1="141" x2="72" y2="141" stroke="#4e342e" stroke-width="1.5"/>
    <rect x="136" y="128" width="26" height="26" rx="3" fill="#b3e5fc" stroke="#4e342e" stroke-width="2"/>
    <line x1="149" y1="128" x2="149" y2="154" stroke="#4e342e" stroke-width="1.5"/><line x1="136" y1="141" x2="162" y2="141" stroke="#4e342e" stroke-width="1.5"/>
  </g>
</svg>
