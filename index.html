    <style>
      /* body fixé + hauteur pilotée en JS (main.ts) : innerHeight suit la barre Safari
         sur tous les iOS, contrairement à 100% (déborde) et 100dvh (iOS 16.4+ only).
         Le padding safe-area repousse le canvas hors de l'encoche et de la barre home
         en paysage (sinon le bas/les côtés du jeu sont rognés). */
      html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
      body {
        position: fixed;
        inset: 0;
        box-sizing: border-box;
        padding:
          calc(env(safe-area-inset-top) + 4px)
          env(safe-area-inset-right)
          calc(env(safe-area-inset-bottom) + 4px)
          env(safe-area-inset-left);
      }
      canvas { display: block; margin: 0 auto; }
    </style>
