<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="42%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="42%" stop-color="#ffab5e"/>
      <stop offset="78%" stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#c94a24"/>
    </radialGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffef2"/>
      <stop offset="55%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffb03a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="poring" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#ffd0e6"/>
      <stop offset="45%" stop-color="#ff86bf"/>
      <stop offset="100%" stop-color="#e8398c"/>
    </radialGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4dfa8"/>
      <stop offset="100%" stop-color="#d9b56a"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- radial manga speed lines -->
  <g fill="#fff3d6" opacity="0.35">
    <polygon points="256,256 40,150 40,182"/>
    <polygon points="256,256 60,300 55,336"/>
    <polygon points="256,256 150,60 182,52"/>
    <polygon points="256,256 470,120 478,152"/>
    <polygon points="256,256 460,360 470,392"/>
    <polygon points="256,256 300,470 268,478"/>
    <polygon points="256,256 96,452 128,470"/>
    <polygon points="256,256 430,440 452,412"/>
  </g>

  <!-- ==================== PORING (being hit) ==================== -->
  <g transform="translate(372,300) rotate(14)">
    <ellipse cx="0" cy="62" rx="66" ry="16" fill="#7a1f12" opacity="0.28"/>
    <path d="M0,-70 C42,-70 70,-34 70,6 C70,44 40,64 0,64 C-40,64 -70,44 -70,6 C-70,-34 -42,-70 0,-70 Z" fill="url(#poring)" stroke="#a81760" stroke-width="7"/>
    <ellipse cx="-22" cy="-30" rx="20" ry="14" fill="#ffffff" opacity="0.75"/>
    <!-- dizzy eyes -->
    <g stroke="#7a1240" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M-40,-2 l20,20 M-20,-2 l-20,20"/>
      <path d="M20,-2 l20,20 M40,-2 l-20,20"/>
    </g>
    <path d="M-14,34 q14,-14 28,0" stroke="#7a1240" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ==================== IMPACT FLASH ==================== -->
  <circle cx="300" cy="286" r="86" fill="url(#flash)"/>
  <g fill="#fffdf0" stroke="#ff8a2b" stroke-width="5" stroke-linejoin="round">
    <path d="M300,286 l14,-58 l14,58 l58,-14 l-58,14 l14,58 l-28,-42 l-28,42 l14,-58 l-58,14 l58,-14 l-14,-58 z" transform="translate(6,-6)"/>
  </g>
  <!-- impact sparkle stars -->
  <g fill="#fff4c2" stroke="#ffb63a" stroke-width="3">
    <path d="M392,214 l7,16 l17,4 l-13,12 l3,17 l-14,-9 l-15,9 l3,-17 l-13,-12 l17,-4 z"/>
    <path d="M232,236 l5,12 l13,3 l-10,9 l2,13 l-10,-7 l-11,7 l2,-13 l-9,-9 l13,-3 z"/>
    <path d="M330,372 l5,12 l13,3 l-10,9 l2,13 l-10,-7 l-11,7 l3,-13 l-10,-9 l13,-3 z"/>
  </g>

  <!-- ==================== PANDA ==================== -->
  <g transform="translate(178,278)">
    <!-- ground shadow -->
    <ellipse cx="-4" cy="132" rx="96" ry="22" fill="#7a1f12" opacity="0.28"/>

    <!-- back leg -->
    <ellipse cx="-52" cy="96" rx="30" ry="34" fill="#20242b"/>
    <!-- body -->
    <path d="M-70,-6 C-92,44 -74,110 -8,110 C58,110 78,46 58,-4 C40,-46 -50,-48 -70,-6 Z" fill="#ffffff" stroke="#20242b" stroke-width="7"/>

    <!-- rear arm (wound up) -->
    <path d="M-58,6 C-96,-6 -116,30 -92,58 C-78,72 -58,60 -54,42 Z" fill="#20242b"/>

    <!-- HEAD -->
    <g transform="translate(2,-58)">
      <!-- ears -->
      <circle cx="-48" cy="-34" r="26" fill="#20242b"/>
      <circle cx="48" cy="-34" r="26" fill="#20242b"/>
      <!-- face -->
      <circle cx="0" cy="0" r="62" fill="#ffffff" stroke="#20242b" stroke-width="7"/>
      <!-- eye patches, angled = determined -->
      <path d="M-38,-14 C-48,-2 -46,20 -30,26 C-14,30 -6,12 -14,-4 C-20,-16 -30,-22 -38,-14 Z" fill="#20242b"/>
      <path d="M38,-14 C48,-2 46,20 30,26 C14,30 6,12 14,-4 C20,-16 30,-22 38,-14 Z" fill="#20242b"/>
      <!-- eyes -->
      <circle cx="-26" cy="6" r="9" fill="#fff"/>
      <circle cx="26" cy="6" r="9" fill="#fff"/>
      <circle cx="-24" cy="8" r="5" fill="#1a1a1a"/>
      <circle cx="28" cy="8" r="5" fill="#1a1a1a"/>
      <!-- determined brows -->
      <path d="M-42,-16 l24,8" stroke="#20242b" stroke-width="6" stroke-linecap="round"/>
      <path d="M42,-16 l-24,8" stroke="#20242b" stroke-width="6" stroke-linecap="round"/>
      <!-- nose + fierce mouth (shout) -->
      <ellipse cx="0" cy="24" rx="8" ry="5" fill="#1a1a1a"/>
      <path d="M-14,36 q14,20 28,0 q-14,6 -28,0 z" fill="#8a1f2a" stroke="#20242b" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- SAKKAT conical straw hat -->
    <g transform="translate(2,-104)">
      <ellipse cx="0" cy="18" rx="104" ry="30" fill="url(#hat)" stroke="#a9823f" stroke-width="6"/>
      <path d="M-96,16 C-70,-72 70,-72 96,16 Z" fill="url(#hat)" stroke="#a9823f" stroke-width="6"/>
      <!-- straw weave lines -->
      <g stroke="#b98f45" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round">
        <path d="M-78,10 C-52,-40 52,-40 78,10"/>
        <path d="M-56,4 C-36,-52 36,-52 56,4"/>
        <path d="M-32,0 C-22,-58 22,-58 32,0"/>
        <path d="M0,-64 L0,16"/>
      </g>
      <circle cx="0" cy="-58" r="7" fill="#b7202f"/>
      <!-- chin strap -->
      <path d="M-70,22 C-64,74 -34,96 0,96 C34,96 64,74 70,22" fill="none" stroke="#7a5a28" stroke-width="5" opacity="0.9"/>
    </g>

    <!-- FRONT arm: punch forward toward Poring -->
    <g>
      <path d="M22,10 C70,-4 118,4 150,14 C160,17 160,33 150,36 C118,46 70,44 26,44 Z" fill="#20242b"/>
      <!-- fist -->
      <circle cx="150" cy="24" r="34" fill="#20242b"/>
      <circle cx="150" cy="24" r="34" fill="none" stroke="#0f1216" stroke-width="4"/>
      <path d="M138,10 q12,-8 24,0 M138,24 q12,-8 24,0" stroke="#3a4049" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
